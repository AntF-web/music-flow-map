<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music Gentrification Flow Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(10, 18, 32, 0.84);
      --text: #f8fafc;
      --muted: #94a3b8;
      --origin: #2dd4bf;
      --market: #fb7185;
      --flow: #f43f5e;
      --secondary: #a78bfa;
      --soft: rgba(248, 250, 252, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    #map {
      width: 100vw;
      height: 100vh;
      z-index: 0;
      background: #08111f;
      filter: saturate(0.78) contrast(1.05);
    }

    .leaflet-control-attribution { display: none; }

    .panel {
      position: absolute;
      z-index: 1000;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(18px);
    }

    .header {
      top: 16px;
      left: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      max-width: 300px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .small {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 14px;
      margin-top: 14px;
      font-size: 12px;
      color: #cbd5e1;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 99px;
    }

    .story-card {
      right: 24px;
      bottom: 112px;
      width: 320px;
      max-height: 40vh;
      overflow: auto;
      padding: 18px;
      border-radius: 22px;
      opacity: 0.92;
      backdrop-filter: blur(14px);
    }

    .period {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(244,63,94,.16);
      color: #fecdd3;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .story-title {
      margin: 14px 0 8px;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .route {
      margin: 0;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 800;
    }

    .description {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .audio-box {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .audio-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(45, 212, 191, .13);
      border: 1px solid rgba(45, 212, 191, .28);
      color: #99f6e4;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
    }

    .audio-link:hover {
      background: rgba(45, 212, 191, .22);
    }

    .audio-note {
      width: 100%;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .filter-list {
      margin: 12px 0 0;
      display: grid;
      gap: 8px;
      max-height: 170px;
      overflow: auto;
      padding-right: 4px;
    }

    .filter-route {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.05);
      cursor: pointer;
      color: #e2e8f0;
      font-size: 12px;
    }

    .filter-route:hover { background: rgba(255,255,255,.10); }

    .filter-route strong { color: white; }

    .timeline {
      left: 50%;
      transform: translateX(-50%);
      bottom: 20px;
      width: min(600px, 92vw);
      padding: 12px;
      border-radius: 999px;
    }

    .controls {
      display: grid;
      grid-template-columns: 42px 1fr 92px 88px;
      gap: 14px;
      align-items: center;
    }

    button {
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.10);
      color: white;
      cursor: pointer;
      transition: transform .2s, background .2s;
      font-weight: 900;
    }

    #play { width: 42px; font-size: 17px; }
    #reset { padding: 0 14px; font-size: 12px; }

    button:hover {
      transform: scale(1.04);
      background: rgba(255,255,255,.16);
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--origin), var(--secondary), var(--flow));
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid var(--flow);
      box-shadow: 0 4px 18px rgba(244,63,94,.55);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid var(--flow);
      box-shadow: 0 4px 18px rgba(244,63,94,.55);
      cursor: pointer;
    }

    .year {
      text-align: right;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .city-label {
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(8, 17, 31, .82);
      border: 1px solid rgba(255,255,255,.13);
      color: #f8fafc;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 6px 22px rgba(0,0,0,.28);
      white-space: nowrap;
    }

    .node {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 8px rgba(255,255,255,.08), 0 0 24px currentColor;
      cursor: pointer;
    }

    .origin { background: var(--origin); color: var(--origin); }
    .market { background: var(--market); color: var(--market); }

    .active-node { animation: pulse 1.55s ease-in-out infinite; }
    .selected-node { box-shadow: 0 0 0 10px rgba(167,139,250,.25), 0 0 32px #a78bfa; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.45); }
    }

    .flow-main {
      stroke-linecap: round;
      stroke-dasharray: 1 16;
      animation: flow 1.1s linear infinite;
      filter: drop-shadow(0 0 10px rgba(244,63,94,.75));
    }

    .flow-filter {
      stroke-linecap: round;
      stroke-dasharray: 8 13;
      animation: flow 1.8s linear infinite;
      filter: drop-shadow(0 0 8px rgba(167,139,250,.65));
    }

    .flow-glow {
      stroke-linecap: round;
      opacity: .24;
      filter: blur(1px);
    }

    @keyframes flow { to { stroke-dashoffset: -34; } }

    .flow-tag {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(244,63,94,.92);
      color: white;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 0 10px 30px rgba(244,63,94,.35);
      white-space: nowrap;
    }

    .hover-preview {
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(8,17,31,.94);
      color: white;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 34px rgba(0,0,0,.36);
      min-width: 180px;
    }

    .hover-preview strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .hover-preview span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(8,17,31,.94);
      color: white;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.35;
    }

    @media (max-width: 760px) {
      .story-card {
        bottom: calc(70px + env(safe-area-inset-bottom));
        max-height: 26dvh;
        opacity: 0.88;
      }

      .header {
        max-width: 240px;
        opacity: 0.85;
      }
      body { overflow: hidden; }

      #map {
        height: 100dvh;
      }

      .header {
        top: max(10px, env(safe-area-inset-top));
        left: 10px;
        right: 10px;
        max-width: none;
        padding: 12px 14px;
        border-radius: 18px;
      }

      h1 {
        font-size: 18px;
        letter-spacing: -0.04em;
      }

      .small {
        display: none;
      }

      .legend {
        margin-top: 9px;
        gap: 8px 10px;
        font-size: 10px;
      }

      .legend-dot {
        width: 8px;
        height: 8px;
      }

      .story-card {
        left: 10px;
        right: 10px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        width: auto;
        max-height: 34dvh;
        overflow: auto;
        padding: 14px;
        border-radius: 22px;
      }

      .story-card::before {
        content: "";
        display: block;
        width: 42px;
        height: 4px;
        margin: 0 auto 10px;
        border-radius: 999px;
        background: rgba(255,255,255,.26);
      }

      .period {
        font-size: 10px;
        padding: 5px 8px;
      }

      .story-title {
        margin: 10px 0 6px;
        font-size: 20px;
      }

      .route {
        font-size: 13px;
      }

      .description {
        display: block;
        margin-top: 9px;
        font-size: 12px;
        line-height: 1.35;
      }

      .audio-box {
        margin-top: 10px;
      }

      .audio-link {
        flex: 1;
        justify-content: center;
        padding: 10px 9px;
        font-size: 11px;
      }

      .audio-note {
        display: none;
      }

      .filter-list {
        max-height: 145px;
        gap: 7px;
      }

      .filter-route {
        padding: 9px;
        font-size: 11px;
      }

      .timeline {
        left: 10px;
        right: 10px;
        bottom: max(10px, env(safe-area-inset-bottom));
        padding: 10px;
        border-radius: 22px;
      }

      .controls {
        grid-template-columns: 44px 1fr 54px;
        gap: 10px;
      }

      button {
        height: 44px;
        min-width: 44px;
      }

      #play {
        width: 44px;
      }

      #reset {
        display: block;
        padding: 0 10px;
        font-size: 10px;
      }

      .year {
        display: none;
      }

      input[type="range"] {
        height: 10px;
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 28px;
        height: 28px;
      }

      input[type="range"]::-moz-range-thumb {
        width: 28px;
        height: 28px;
      }

      .city-label {
        display: none;
      }

      .node {
        width: 22px;
        height: 22px;
        border-width: 3px;
        box-shadow: 0 0 0 9px rgba(255,255,255,.08), 0 0 22px currentColor;
      }

      .active-node {
        animation: pulse 1.25s ease-in-out infinite;
      }

      .flow-main {
        stroke-dasharray: 1 14;
      }

      .flow-tag {
        font-size: 10px;
        padding: 6px 9px;
      }

      .hover-preview {
        display: none;
      }

      .leaflet-popup-content {
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .header { padding: 10px 12px; }
      h1 { font-size: 16px; }
      .story-card { max-height: 38dvh; }
      .description { display: none; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <section class="panel header">
    <h1>Popular Music: Appropriation Flow Map</h1>
    <p class="small">Click any city to filter all connected routes. Hover for a quick preview.</p>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--origin)"></span>origin</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--market)"></span>market</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--flow)"></span>timeline flow</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--secondary)"></span>filtered flows</div>
    </div>
  </section>

  <section class="panel story-card" id="story"></section>

  <section class="panel timeline">
    <div class="controls">
      <button id="play" aria-label="Play timeline">▶</button>
      <input id="slider" type="range" min="0" max="50" value="0" />
      <button id="reset">ALL</button>
      <div class="year" id="year">1880s</div>
    </div>
  </section>

  <script>
    const isMobile = window.matchMedia('(max-width: 760px)').matches;

    const map = L.map('map', {
      zoomControl: false,
      worldCopyJump: true,
      attributionControl: false,
      tap: true,
      dragging: true
    }).setView(isMobile ? [18, -30] : [28, -35], isMobile ? 2 : 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19,
      pane: 'shadowPane'
    }).addTo(map);

    const places = {
      south: ['U.S. South', [32.3, -90.2], 'origin', 'Black folk, blues roots, spirituals, and work-song traditions.'],
      newYork: ['New York', [40.75, -73.99], 'market', 'Publishing, labels, media, Broadway, radio, streaming, and pop-business infrastructure.'],
      newOrleans: ['New Orleans', [29.95, -90.07], 'origin', 'Jazz birthplace shaped by Black, Creole, Caribbean, brass-band, and street traditions.'],
      chicago: ['Chicago', [41.88, -87.63], 'origin', 'Swing, blues, house, migration, and club-culture crossover hub.'],
      memphis: ['Memphis', [35.15, -90.05], 'origin', 'Blues, soul, gospel, Sun Records, Stax, and rock crossover.'],
      detroit: ['Detroit', [42.33, -83.05], 'origin', 'Motown, techno, Black pop futurism, and industrial urban modernity.'],
      london: ['London', [51.51, -0.13], 'market', 'British rock, punk, club culture, pirate radio, grime, dubstep, garage, and global re-export.'],
      la: ['Los Angeles', [34.05, -118.24], 'market', 'Hollywood, labels, celebrity media, pop packaging, and visual culture.'],
      bronx: ['Bronx', [40.84, -73.86], 'origin', 'Hip-hop foundations in Black, Caribbean, and Latino youth culture.'],
      seattle: ['Seattle', [47.61, -122.33], 'origin', 'Grunge and alternative rock transformed into a major-label authenticity market.'],
      atlanta: ['Atlanta', [33.75, -84.39], 'origin', 'Trap and Southern hip-hop production as dominant global pop language.'],
      stockholm: ['Stockholm', [59.33, 18.06], 'market', 'Global pop songwriting, production, and streaming-era export hub.'],
      global: ['Platforms', [21, 8], 'market', 'Streaming, TikTok, algorithmic trend cycles, and viral monetization.'],
      nyClubs: ['NYC Clubs', [40.72, -74.00], 'origin', 'Queer, Black, and Latino nightlife cultures behind disco and dance music.'],
      kingston: ['Kingston', [17.98, -76.79], 'origin', 'Sound-system culture, reggae, dub, dancehall, and remix logic.'],
      sanJuan: ['San Juan', [18.47, -66.10], 'origin', 'Reggaetón, dembow, underground mixtapes, and Caribbean urban music.'],
      panama: ['Panama City', [8.98, -79.52], 'origin', 'Reggae en español and Afro-Caribbean Spanish-language dance music.'],
      mexicoCity: ['Mexico City', [19.43, -99.13], 'market', 'Latin pop, rock en español, cumbia mutation, and transnational media markets.'],
      buenosAires: ['Buenos Aires', [-34.60, -58.38], 'origin', 'Tango, rock nacional, electronic scenes, and Latin urban crossover.'],
      rio: ['Rio de Janeiro', [-22.91, -43.17], 'origin', 'Samba, funk carioca, favela party culture, and exportable Brazilian identities.'],
      saoPaulo: ['São Paulo', [-23.55, -46.63], 'market', 'Brazilian media, clubs, labels, festivals, and urban-pop commercialization.'],
      havana: ['Havana', [23.11, -82.37], 'origin', 'Son, rumba, mambo, salsa roots, Afro-Cuban percussion, and exportable tropical modernity.'],
      santoDomingo: ['Santo Domingo', [18.49, -69.93], 'origin', 'Merengue, bachata, dembow, and Dominican street-pop circuits.'],
      medellin: ['Medellín', [6.24, -75.58], 'market', 'Reggaetón pop, Latin urban industry, labels, song camps, and streaming dominance.'],
      barranquilla: ['Barranquilla', [10.98, -74.80], 'origin', 'Cumbia, champeta, carnival routes, Afro-Caribbean Colombian dance culture.'],
      lima: ['Lima', [-12.05, -77.04], 'origin', 'Chicha, cumbia amazónica, Andean migration, and urban working-class psychedelia.'],
      bristol: ['Bristol', [51.45, -2.59], 'origin', 'Trip-hop, sound-system culture, dub inheritance, and underground UK electronics.'],
      manchester: ['Manchester', [53.48, -2.24], 'origin', 'Post-punk, rave, acid house, indie, and warehouse culture.'],
      birmingham: ['Birmingham', [52.49, -1.89], 'origin', 'UK metal, bhangra, bass, and multicultural working-class music scenes.'],
      croydon: ['Croydon', [51.37, -0.10], 'origin', 'Dubstep’s early underground and record-shop/radio network.'],
      southLondon: ['South London', [51.45, -0.10], 'origin', 'UK garage, grime, drill, pirate radio, estates, clubs, and MC culture.'],
      eastLondon: ['East London', [51.54, -0.02], 'origin', 'Grime, pirate radio, road rap, club mutations, and DIY video platforms.'],
      lagos: ['Lagos', [6.52, 3.38], 'origin', 'Afrobeats, Afro-pop, street-pop, fuji inheritance, labels, clubs, and Nollywood adjacency.'],
      accra: ['Accra', [5.56, -0.20], 'origin', 'Highlife, hiplife, azonto, afrobeats circuits, and diasporic pop exchange.'],
      johannesburg: ['Johannesburg', [-26.20, 28.04], 'origin', 'Kwaito, amapiano, house, township groove, and dance-floor innovation.'],
      kinshasa: ['Kinshasa', [-4.32, 15.31], 'origin', 'Congolese rumba, soukous, guitar virtuosity, and pan-African dance-band circuits.'],
      luanda: ['Luanda', [-8.84, 13.23], 'origin', 'Kuduro, semba, kizomba, and Lusophone club circulation.'],
      dakar: ['Dakar', [14.69, -17.45], 'origin', 'Mbalax, sabar percussion, hip-hop, and Francophone West African scenes.'],
      abidjan: ['Abidjan', [5.36, -4.01], 'origin', 'Coupé-décalé, zouglou, dance culture, and Francophone club export.'],
      cairo: ['Cairo', [30.04, 31.24], 'origin', 'Mahraganat, shaabi, cassette/pop circuits, and street wedding sound systems.'],
      dar: ['Dar es Salaam', [-6.79, 39.21], 'origin', 'Bongo flava, taarab links, Swahili pop, and East African radio circuits.'],
      nairobi: ['Nairobi', [-1.29, 36.82], 'origin', 'Gengetone, kapuka, East African hip-hop, and mobile-first youth scenes.'],

      // ASIA
      tokyo: ['Tokyo', [35.68, 139.69], 'market', 'J-pop industry, idol systems, and global pop adaptation/production.'],
      seoul: ['Seoul', [37.57, 126.98], 'market', 'K-pop training systems, global fandom platforms, and export machinery.'],
      mumbai: ['Mumbai', [19.07, 72.88], 'market', 'Bollywood playback system, film music industry, and mass distribution.'],
      delhi: ['Delhi', [28.61, 77.21], 'origin', 'Punjabi pop, bhangra, indie rap, and North Indian urban scenes.'],
      jakarta: ['Jakarta', [-6.21, 106.85], 'origin', 'Dangdut, Indo-pop, and hybrid local-global dance forms.'],
      manila: ['Manila', [14.60, 120.98], 'origin', 'OPM, karaoke culture, diaspora vocals, and cover economies.'],
      bangkok: ['Bangkok', [13.75, 100.50], 'origin', 'Luk thung, mor lam, and Thai pop hybrids in urban club circuits.'],
      beijing: ['Beijing', [39.90, 116.40], 'market', 'Mandopop, state-influenced pop, and digital platform ecosystems.'],
      shanghai: ['Shanghai', [31.23, 121.47], 'market', 'Chinese pop industry, EDM festivals, and streaming ecosystems.'],
      karachi: ['Karachi', [24.86, 67.01], 'origin', 'Pakistani pop, qawwali fusion, Coke Studio aesthetics.'],
      istanbul: ['Istanbul', [41.01, 28.97], 'origin', 'Arabesk, Anatolian rock, and East-West fusion pop scenes.']
    };

    const routes = [
      ['1880s', 'Folk / blues roots', 'U.S. South', 'New York', 'Black folk traditions enter white-owned sheet music and entertainment markets.', 'south', 'newYork', [36, -84, 4]],
      ['1920s', 'Jazz', 'New Orleans', 'New York', 'Jazz leaves local Black performance cultures and is packaged nationally.', 'newOrleans', 'newYork', [35, -83, 4]],
      ['1940s', 'Swing', 'Chicago', 'New York', 'Black big-band innovation becomes mass dance culture.', 'chicago', 'newYork', [41, -81, 5]],
      ['1950s', 'Rock ’n’ roll', 'Memphis', 'Los Angeles', 'R&B idioms are rebranded for white teen media markets.', 'memphis', 'la', [35, -104, 4]],
      ['1960s', 'Soul / Motown', 'Detroit', 'New York', 'Black pop is polished for national crossover systems.', 'detroit', 'newYork', [42, -80, 5]],

      // ASIA ROUTES
      ['1960s', 'Bollywood playback', 'Mumbai', 'Global platforms', 'Film music becomes a dominant commercial form, later exported via diaspora and streaming.', 'mumbai', 'global', [20, 60, 3]],
      ['1980s', 'City pop', 'Tokyo', 'Global platforms', 'Japanese urban pop is rediscovered and monetized globally via internet nostalgia and algorithms.', 'tokyo', 'global', [35, 120, 3]],
      ['1990s', 'Bhangra pop', 'Delhi', 'London', 'Punjabi diaspora sound becomes UK club and later global pop fusion.', 'delhi', 'london', [35, 30, 3]],
      ['2000s', 'K-pop', 'Seoul', 'Global platforms', 'Highly engineered idol pop becomes a global export industry.', 'seoul', 'global', [37, 110, 3]],
      ['2000s', 'Mandopop / C-pop', 'Shanghai', 'Global platforms', 'Chinese-language pop integrates into global streaming ecosystems.', 'shanghai', 'global', [30, 110, 3]],
      ['2010s', 'Indo-pop / dangdut', 'Jakarta', 'Global platforms', 'Local dance genres circulate through TikTok and regional streaming economies.', 'jakarta', 'global', [-2, 110, 3]],
      ['2010s', 'OPM viral pop', 'Manila', 'Global platforms', 'Cover culture and vocal performance economies scale globally via YouTube.', 'manila', 'global', [10, 130, 3]],
      ['2010s', 'Thai pop fusion', 'Bangkok', 'Global platforms', 'Regional styles hybridize with EDM and K-pop aesthetics.', 'bangkok', 'global', [15, 110, 3]],
      ['2020s', 'Anatolian / Arabesk revival', 'Istanbul', 'Global platforms', 'Local melancholic traditions are recontextualized in global indie/club circuits.', 'istanbul', 'global', [30, 40, 3]],
      ['2020s', 'Pakistani pop / Coke Studio', 'Karachi', 'Global platforms', 'Fusion of folk, Sufi, and pop aesthetics becomes globally circulated content.', 'karachi', 'global', [25, 70, 3]],

      // keep existing routes
      ['2020s', 'Platform pop', 'Platforms', 'New York', 'Algorithms compress subculture-to-market cycles into weeks or days.', 'global', 'newYork', [31, -45, 3]]
    ];

    const markers = {};
    const labels = [];
    const filterLines = [];
    let hoverLabel = null;
    let selectedCity = null;

    Object.entries(places).forEach(([key, [name, coords, kind, note]]) => {
      const nodeIcon = L.divIcon({
        className: '',
        html: `<div class="node ${kind}" data-city="${key}"></div>`,
        iconSize: isMobile ? [22,22] : [18,18],
        iconAnchor: isMobile ? [11,11] : [9,9]
      });
      const labelIcon = L.divIcon({
        className: '',
        html: `<div class="city-label">${name}</div>`,
        iconSize: [100,26],
        iconAnchor: [50,-12]
      });
      markers[key] = L.marker(coords, { icon: nodeIcon }).addTo(map);
      markers[key].bindPopup(`<strong>${name}</strong><br>${note}`);

      if (!isMobile) {
        markers[key].on('mouseover', () => showHover(key));
        markers[key].on('mouseout', clearHover);
      }
      markers[key].on('click', () => filterCity(key));

      labels.push(L.marker(coords, { icon: labelIcon, interactive: false }).addTo(map));
    });

    let mainLine, glowLine, flowTag;
    let index = 0;
    let timer;
    let isPlaying = false;

    const story = document.getElementById('story');
    const slider = document.getElementById('slider');
    const year = document.getElementById('year');
    const play = document.getElementById('play');
    const reset = document.getElementById('reset');

    function connectedRoutes(key) {
      return routes
        .map((route, i) => ({ route, i }))
        .filter(({ route }) => route[5] === key || route[6] === key);
    }

    function clearHover() {
      if (hoverLabel) {
        map.removeLayer(hoverLabel);
        hoverLabel = null;
      }
    }

    function showHover(key) {
      clearHover();
      const [name, coords, kind, note] = places[key];
      const count = connectedRoutes(key).length;
      hoverLabel = L.marker(coords, {
        icon: L.divIcon({
          className: '',
          html: `<div class="hover-preview"><strong>${name}</strong><span>${count} connected flow${count === 1 ? '' : 's'}</span><span>${note}</span></div>`,
          iconSize: [220, 86],
          iconAnchor: [110, 98]
        }),
        interactive: false
      }).addTo(map);
    }

    function arc(a, b) {
      const points = [];
      const steps = 90;
      const [lat1, lng1] = a;
      const [lat2, lng2] = b;
      let lngDelta = lng2 - lng1;
      if (Math.abs(lngDelta) > 180) lngDelta = lngDelta > 0 ? lngDelta - 360 : lngDelta + 360;
      const distance = Math.abs(lngDelta);
      const height = Math.min(18, Math.max(4, distance / 8));
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        let lng = lng1 + lngDelta * t;
        if (lng > 180) lng -= 360;
        if (lng < -180) lng += 360;
        points.push([
          lat1 + (lat2 - lat1) * t + Math.sin(Math.PI * t) * height * .28,
          lng
        ]);
      }
      return points;
    }

    function clearFilterLines() {
      while (filterLines.length) map.removeLayer(filterLines.pop());
      selectedCity = null;
      Object.values(markers).forEach(marker => {
        const el = marker.getElement();
        if (el) el.querySelector('.node')?.classList.remove('selected-node');
      });
    }

    function clearMainRoute() {
      if (mainLine) map.removeLayer(mainLine);
      if (glowLine) map.removeLayer(glowLine);
      if (flowTag) map.removeLayer(flowTag);
      mainLine = null;
      glowLine = null;
      flowTag = null;
    }

    function addRouteLine(route, style = 'main') {
      const start = places[route[5]][1];
      const end = places[route[6]][1];
      const path = arc(start, end);

      if (style === 'filter') {
        const line = L.polyline(path, {
          color: '#a78bfa',
          weight: 4,
          opacity: .82,
          className: 'flow-filter'
        }).addTo(map);
        filterLines.push(line);
        return line;
      }

      glowLine = L.polyline(path, {
        color: '#f43f5e',
        weight: 18,
        opacity: .24,
        className: 'flow-glow'
      }).addTo(map);

      mainLine = L.polyline(path, {
        color: '#fb7185',
        weight: 6,
        opacity: .98,
        className: 'flow-main'
      }).addTo(map);

      const midpoint = path[Math.floor(path.length * .52)];
      flowTag = L.marker(midpoint, {
        icon: L.divIcon({
          className: '',
          html: `<div class="flow-tag">${route[1]}</div>`,
          iconAnchor: [45, 15]
        }),
        interactive: false
      }).addTo(map);
    }

    function audioSearchLinks(genre, fromName, toName) {
      const query = encodeURIComponent(`${genre} music example ${fromName}`);
      const query2 = encodeURIComponent(`${genre} history mix`);
      return `
        <div class="audio-box">
          <a class="audio-link" href="https://www.youtube.com/results?search_query=${query}" target="_blank" rel="noopener">▶ examples</a>
          <a class="audio-link" href="https://www.youtube.com/results?search_query=${query2}" target="_blank" rel="noopener">♫ mixes</a>
          <span class="audio-note">Links open public search results so the map avoids embedding copyrighted audio directly.</span>
        </div>
      `;
    }

    function setActive(i, keepFilter = false) {
      index = i;
      const route = routes[i];
      const [period, genre, fromName, toName, description, fromKey, toKey, camera] = route;

      clearMainRoute();
      if (!keepFilter) clearFilterLines();

      Object.values(markers).forEach(marker => {
        const el = marker.getElement();
        if (el) el.querySelector('.node')?.classList.remove('active-node');
      });

      [fromKey, toKey].forEach(k => {
        const el = markers[k].getElement();
        if (el) el.querySelector('.node')?.classList.add('active-node');
      });

      addRouteLine(route, 'main');

      story.innerHTML = `
        <span class="period">${period}</span>
        <h2 class="story-title">${genre}</h2>
        <p class="route">${fromName} → ${toName}</p>
        <p class="description">${description}</p>
        ${audioSearchLinks(genre, fromName, toName)}
      `;

      year.textContent = period;
      slider.value = i;
      map.flyTo([camera[0], camera[1]], isMobile ? Math.max(2, camera[2] - 1) : camera[2], { duration: .85 });
    }

    function filterCity(key) {
      clearFilterLines();
      selectedCity = key;
      const [name, coords] = places[key];
      const related = connectedRoutes(key);

      Object.values(markers).forEach(marker => {
        const el = marker.getElement();
        if (el) el.querySelector('.node')?.classList.remove('selected-node');
      });
      markers[key].getElement().querySelector('.node').classList.add('selected-node');

      related.forEach(({ route }) => addRouteLine(route, 'filter'));

      const list = related.length
        ? related.map(({ route, i }) => `
          <div class="filter-route" onclick="window.__setRoute(${i})">
            <strong>${route[1]}</strong><br>${route[2]} → ${route[3]} · ${route[0]}<br>
            <span style="color:#99f6e4">▶ click route for audio examples</span>
          </div>
        `).join('')
        : '<div class="filter-route">No connected routes yet.</div>';

      story.innerHTML = `
        <span class="period">city filter</span>
        <h2 class="story-title">${name}</h2>
        <p class="route">${related.length} connected flow${related.length === 1 ? '' : 's'}</p>
        <div class="filter-list">${list}</div>
      `;

      year.textContent = 'Filter';
      map.flyTo(coords, isMobile ? 4 : 5, { duration: .8 });
    }

    window.__setRoute = function(i) {
      setActive(i, true);
    };

    slider.addEventListener('input', e => setActive(Number(e.target.value)));

    play.addEventListener('click', () => {
      isPlaying = !isPlaying;
      play.textContent = isPlaying ? 'Ⅱ' : '▶';
      if (isPlaying) {
        timer = setInterval(() => setActive((index + 1) % routes.length), 5200);
      } else {
        clearInterval(timer);
      }
    });

    reset.addEventListener('click', () => {
      clearFilterLines();
      setActive(index);
    });

    setActive(0);
  </script>
</body>
</html>
