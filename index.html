<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music Gentrification Flow Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(10, 18, 32, 0.84);
      --text: #f8fafc;
      --muted: #94a3b8;
      --origin: #2dd4bf;
      --market: #fb7185;
      --flow: #f43f5e;
      --secondary: #a78bfa;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    #map {
      width: 100vw;
      height: 100vh;
      background: #08111f;
      filter: saturate(0.8) contrast(1.08);
      z-index: 0;
    }

    .leaflet-control-attribution { display: none; }

    .panel {
      position: absolute;
      z-index: 1000;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(16px);
    }

    .header {
      top: 16px;
      left: 16px;
      max-width: 305px;
      padding: 14px 16px;
      border-radius: 18px;
      opacity: .92;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.6vw, 30px);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .small {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      margin-top: 12px;
      font-size: 11px;
      color: #cbd5e1;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
    }

    .story-card {
      right: 18px;
      bottom: 92px;
      width: 320px;
      max-height: 38vh;
      overflow: auto;
      padding: 16px;
      border-radius: 22px;
      opacity: .92;
    }

    .period {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(244,63,94,.16);
      color: #fecdd3;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .story-title {
      margin: 12px 0 7px;
      font-size: 23px;
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .route {
      margin: 0;
      color: #dbeafe;
      font-size: 13px;
      font-weight: 800;
    }

    .description {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    .audio-box {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .audio-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(45, 212, 191, .13);
      border: 1px solid rgba(45, 212, 191, .28);
      color: #99f6e4;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
    }

    .audio-link:hover { background: rgba(45, 212, 191, .22); }

    .audio-note {
      width: 100%;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .filter-list {
      margin: 12px 0 0;
      display: grid;
      gap: 8px;
      max-height: 170px;
      overflow: auto;
      padding-right: 4px;
    }

    .filter-route {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.05);
      cursor: pointer;
      color: #e2e8f0;
      font-size: 12px;
    }

    .filter-route:hover { background: rgba(255,255,255,.10); }
    .filter-route strong { color: white; }

    .timeline {
      left: 50%;
      transform: translateX(-50%);
      bottom: 18px;
      width: min(620px, 92vw);
      padding: 12px;
      border-radius: 999px;
    }

    .controls {
      display: grid;
      grid-template-columns: 42px 1fr 88px 78px;
      gap: 12px;
      align-items: center;
    }

    button {
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.10);
      color: white;
      cursor: pointer;
      transition: transform .2s, background .2s;
      font-weight: 900;
    }

    #play { width: 42px; font-size: 17px; }
    #reset { padding: 0 12px; font-size: 12px; }

    button:hover {
      transform: scale(1.04);
      background: rgba(255,255,255,.16);
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--origin), var(--secondary), var(--flow));
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid var(--flow);
      box-shadow: 0 4px 18px rgba(244,63,94,.55);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid var(--flow);
      box-shadow: 0 4px 18px rgba(244,63,94,.55);
      cursor: pointer;
    }

    .year {
      text-align: right;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .city-label {
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(8, 17, 31, .82);
      border: 1px solid rgba(255,255,255,.13);
      color: #f8fafc;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 6px 22px rgba(0,0,0,.28);
      white-space: nowrap;
    }

    .node {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 8px rgba(255,255,255,.08), 0 0 24px currentColor;
      cursor: pointer;
    }

    .origin { background: var(--origin); color: var(--origin); }
    .market { background: var(--market); color: var(--market); }

    .active-node { animation: pulse 1.55s ease-in-out infinite; }
    .selected-node { box-shadow: 0 0 0 10px rgba(167,139,250,.25), 0 0 32px #a78bfa; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.45); }
    }

    .flow-main {
      stroke-linecap: round;
      stroke-dasharray: 1 16;
      animation: flow 1.1s linear infinite;
      filter: drop-shadow(0 0 10px rgba(244,63,94,.75));
    }

    .flow-filter {
      stroke-linecap: round;
      stroke-dasharray: 8 13;
      animation: flow 1.8s linear infinite;
      filter: drop-shadow(0 0 8px rgba(167,139,250,.65));
    }

    .flow-glow {
      stroke-linecap: round;
      opacity: .24;
      filter: blur(1px);
    }

    @keyframes flow { to { stroke-dashoffset: -34; } }

    .flow-tag {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(244,63,94,.92);
      color: white;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 0 10px 30px rgba(244,63,94,.35);
      white-space: nowrap;
    }

    .hover-preview {
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(8,17,31,.94);
      color: white;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 34px rgba(0,0,0,.36);
      min-width: 180px;
    }

    .hover-preview strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .hover-preview span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(8,17,31,.94);
      color: white;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.35;
    }

    /* Responsive layout */
    @media (min-width: 1200px) {
      .header {
        max-width: 330px;
      }

      .story-card {
        width: 360px;
        max-height: 44vh;
      }

      .timeline {
        width: min(720px, 70vw);
      }
    }

    @media (max-width: 1024px) {
      .header {
        top: 14px;
        left: 14px;
        max-width: 280px;
        padding: 13px 15px;
      }

      .story-card {
        right: 14px;
        bottom: 88px;
        width: 300px;
        max-height: 36vh;
      }

      .timeline {
        width: min(620px, 88vw);
      }

      .city-label {
        font-size: 10px;
        padding: 5px 8px;
      }
    }

    @media (max-width: 760px) {
      #map {
        height: 100dvh;
      }

      .header {
        top: max(10px, env(safe-area-inset-top));
        left: 10px;
        width: min(250px, calc(100vw - 20px));
        max-width: none;
        padding: 11px 13px;
        border-radius: 18px;
        opacity: .88;
      }

      h1 {
        font-size: 17px;
        letter-spacing: -0.04em;
      }

      .small {
        display: none;
      }

      .legend {
        margin-top: 8px;
        gap: 7px 9px;
        font-size: 10px;
      }

      .legend-dot {
        width: 8px;
        height: 8px;
      }

      .story-card {
        left: 10px;
        right: 10px;
        bottom: calc(78px + env(safe-area-inset-bottom));
        width: auto;
        max-height: 30dvh;
        overflow: auto;
        padding: 13px;
        border-radius: 20px;
        opacity: .91;
      }

      .story-card::before {
        content: "";
        display: block;
        width: 44px;
        height: 4px;
        margin: 0 auto 9px;
        border-radius: 999px;
        background: rgba(255,255,255,.28);
      }

      .period {
        font-size: 10px;
        padding: 5px 8px;
      }

      .story-title {
        margin: 9px 0 6px;
        font-size: 19px;
      }

      .route {
        font-size: 13px;
      }

      .description {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.35;
      }

      .audio-box {
        margin-top: 9px;
      }

      .audio-link {
        flex: 1 1 44%;
        justify-content: center;
        padding: 9px;
        font-size: 11px;
      }

      .audio-note {
        display: none;
      }

      .filter-list {
        max-height: 145px;
        gap: 7px;
      }

      .filter-route {
        padding: 9px;
        font-size: 11px;
      }

      .timeline {
        left: 10px;
        right: 10px;
        bottom: max(10px, env(safe-area-inset-bottom));
        width: auto;
        transform: none;
        padding: 10px;
        border-radius: 22px;
      }

      .controls {
        grid-template-columns: 44px 1fr 54px;
        gap: 10px;
      }

      button {
        height: 44px;
        min-width: 44px;
      }

      #play {
        width: 44px;
      }

      #reset {
        display: block;
        padding: 0 10px;
        font-size: 10px;
      }

      .year {
        display: none;
      }

      input[type="range"] {
        height: 10px;
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 28px;
        height: 28px;
      }

      input[type="range"]::-moz-range-thumb {
        width: 28px;
        height: 28px;
      }

      .city-label {
        display: none;
      }

      .node {
        width: 22px;
        height: 22px;
        border-width: 3px;
        box-shadow: 0 0 0 9px rgba(255,255,255,.08), 0 0 22px currentColor;
      }

      .active-node {
        animation: pulse 1.25s ease-in-out infinite;
      }

      .flow-main {
        stroke-dasharray: 1 14;
      }

      .flow-tag {
        font-size: 10px;
        padding: 6px 9px;
      }

      .hover-preview {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .header {
        width: min(220px, calc(100vw - 20px));
        padding: 10px 12px;
      }

      h1 {
        font-size: 16px;
      }

      .legend {
        display: none;
      }

      .story-card {
        max-height: 27dvh;
        padding: 12px;
      }

      .story-title {
        font-size: 18px;
      }

      .description {
        display: none;
      }

      .controls {
        grid-template-columns: 42px 1fr 50px;
      }

      button {
        height: 42px;
        min-width: 42px;
      }
    }

    @media (max-height: 620px) and (max-width: 760px) {
      .header {
        opacity: .78;
      }

      .story-card {
        max-height: 24dvh;
      }

      .story-title {
        font-size: 17px;
      }

      .description,
      .audio-note {
        display: none;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .header {
        width: 230px;
      }

      .story-card {
        top: 10px;
        right: 10px;
        bottom: auto;
        left: auto;
        width: min(320px, 38vw);
        max-height: calc(100dvh - 86px);
      }

      .timeline {
        left: 50%;
        right: auto;
        width: min(520px, 54vw);
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <section class="panel header">
    <h1>Popular Music: Appropriation Flow Map</h1>
    <p class="small">Click any city to filter all connected routes. Hover for a quick preview.</p>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--origin)"></span>origin</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--market)"></span>market</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--flow)"></span>timeline</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--secondary)"></span>filter</div>
    </div>
  </section>

  <section class="panel story-card" id="story" aria-live="polite"></section>

  <section class="panel timeline">
    <div class="controls">
      <button id="play" aria-label="Play timeline">▶</button>
      <input id="slider" type="range" min="0" value="0" aria-label="Timeline route selector" />
      <button id="reset" aria-label="Reset filters">ALL</button>
      <div class="year" id="year">1880s</div>
    </div>
  </section>

    ];

    function isValidPlace(key) {
      return Boolean(places[key] && Array.isArray(places[key][1]) && places[key][1].length === 2);
    }

    function isValidRoute(route) {
      return route && typeof route === 'object' &&
        typeof route.period === 'string' &&
        typeof route.genre === 'string' &&
        typeof route.from === 'string' &&
        typeof route.to === 'string' &&
        isValidPlace(route.from) &&
        isValidPlace(route.to) &&
        Array.isArray(route.camera) &&
        route.camera.length === 3;
    }

    const routes = rawRoutes.filter(isValidRoute);

    function runDataTests() {
      console.group('Music map data tests');
      console.assert(routes.length > 0, 'Expected at least one valid route');
      console.assert(routes.length === rawRoutes.length, 'Some raw routes were invalid and filtered out', { raw: rawRoutes.length, valid: routes.length });
      routes.forEach((route, i) => {
        console.assert(isValidRoute(route), `Route ${i} should be valid`, route);
        console.assert(isValidPlace(route.from), `Route ${i} missing from-place: ${route.from}`);
        console.assert(isValidPlace(route.to), `Route ${i} missing to-place: ${route.to}`);
      });
      console.assert(Object.keys(places).length >= 10, 'Expected multiple city/place markers');
      console.groupEnd();
    }

    runDataTests();

    const map = L.map('map', {
      zoomControl: false,
      worldCopyJump: true,
      attributionControl: false,
      tap: true,
      dragging: true
    }).setView(isMobile ? [18, -30] : [28, -35], isMobile ? 2 : 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19,
      pane: 'shadowPane'
    }).addTo(map);

    const markers = {};
    const labels = [];
    const filterLines = [];
    let hoverLabel = null;
    let selectedCity = null;
    let mainLine = null;
    let glowLine = null;
    let flowTag = null;
    let index = 0;
    let timer = null;
    let isPlaying = false;

    const story = document.getElementById('story');
    const slider = document.getElementById('slider');
    const year = document.getElementById('year');
    const play = document.getElementById('play');
    const reset = document.getElementById('reset');

    slider.max = String(Math.max(0, routes.length - 1));

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function clampRouteIndex(value) {
      const n = Number.parseInt(value, 10);
      if (!Number.isFinite(n)) return 0;
      return Math.min(Math.max(n, 0), routes.length - 1);
    }

    function getNodeElement(key) {
      const marker = markers[key];
      if (!marker) return null;
      const el = marker.getElement();
      return el ? el.querySelector('.node') : null;
    }

    function connectedRoutes(key) {
      return routes
        .map((route, i) => ({ route, i }))
        .filter(({ route }) => route && (route.from === key || route.to === key));
    }

    function clearHover() {
      if (hoverLabel) {
        map.removeLayer(hoverLabel);
        hoverLabel = null;
      }
    }

    function showHover(key) {
      clearHover();
      const place = places[key];
      if (!place) return;
      const [name, coords, , note] = place;
      const count = connectedRoutes(key).length;
      hoverLabel = L.marker(coords, {
        icon: L.divIcon({
          className: '',
          html: `<div class="hover-preview"><strong>${escapeHtml(name)}</strong><span>${count} connected flow${count === 1 ? '' : 's'}</span><span>${escapeHtml(note)}</span></div>`,
          iconSize: [220, 86],
          iconAnchor: [110, 98]
        }),
        interactive: false
      }).addTo(map);
    }

    function arc(a, b) {
      const points = [];
      const steps = 90;
      const [lat1, lng1] = a;
      const [lat2, lng2] = b;
      let lngDelta = lng2 - lng1;
      if (Math.abs(lngDelta) > 180) lngDelta = lngDelta > 0 ? lngDelta - 360 : lngDelta + 360;
      const distance = Math.abs(lngDelta);
      const height = Math.min(18, Math.max(4, distance / 8));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        let lng = lng1 + lngDelta * t;
        if (lng > 180) lng -= 360;
        if (lng < -180) lng += 360;
        points.push([
          lat1 + (lat2 - lat1) * t + Math.sin(Math.PI * t) * height * .28,
          lng
        ]);
      }

      return points;
    }

    function clearFilterLines() {
      while (filterLines.length) map.removeLayer(filterLines.pop());
      selectedCity = null;
      Object.keys(markers).forEach(key => getNodeElement(key)?.classList.remove('selected-node'));
    }

    function clearMainRoute() {
      if (mainLine) map.removeLayer(mainLine);
      if (glowLine) map.removeLayer(glowLine);
      if (flowTag) map.removeLayer(flowTag);
      mainLine = null;
      glowLine = null;
      flowTag = null;
    }

    function addRouteLine(route, style = 'main') {
      if (!isValidRoute(route)) return null;
      const start = places[route.from][1];
      const end = places[route.to][1];
      const path = arc(start, end);

      if (style === 'filter') {
        const line = L.polyline(path, {
          color: '#a78bfa',
          weight: 4,
          opacity: .82,
          className: 'flow-filter'
        }).addTo(map);
        filterLines.push(line);
        return line;
      }

      glowLine = L.polyline(path, {
        color: '#f43f5e',
        weight: 18,
        opacity: .24,
        className: 'flow-glow'
      }).addTo(map);

      mainLine = L.polyline(path, {
        color: '#fb7185',
        weight: 6,
        opacity: .98,
        className: 'flow-main'
      }).addTo(map);

      const midpoint = path[Math.floor(path.length * .52)];
      flowTag = L.marker(midpoint, {
        icon: L.divIcon({
          className: '',
          html: `<div class="flow-tag">${escapeHtml(route.genre)}</div>`,
          iconAnchor: [45, 15]
        }),
        interactive: false
      }).addTo(map);

      return mainLine;
    }

    function audioSearchLinks(genre, fromName) {
      const query = encodeURIComponent(`${genre} music example ${fromName}`);
      const query2 = encodeURIComponent(`${genre} history mix`);
      return `
        <div class="audio-box">
          <a class="audio-link" href="https://www.youtube.com/results?search_query=${query}" target="_blank" rel="noopener">▶ examples</a>
          <a class="audio-link" href="https://www.youtube.com/results?search_query=${query2}" target="_blank" rel="noopener">♫ mixes</a>
          <span class="audio-note">Links open public search results so the map avoids embedding copyrighted audio directly.</span>
        </div>
      `;
    }

    function setActive(i, keepFilter = false) {
      if (!routes.length) {
        story.innerHTML = '<h2 class="story-title">No valid routes found</h2><p class="description">Check the route data in the script.</p>';
        return;
      }

      index = clampRouteIndex(i);
      const route = routes[index];
      if (!isValidRoute(route)) return;

      clearMainRoute();
      if (!keepFilter) clearFilterLines();

      Object.keys(markers).forEach(key => getNodeElement(key)?.classList.remove('active-node'));
      getNodeElement(route.from)?.classList.add('active-node');
      getNodeElement(route.to)?.classList.add('active-node');

      addRouteLine(route, 'main');

      story.innerHTML = `
        <span class="period">${escapeHtml(route.period)}</span>
        <h2 class="story-title">${escapeHtml(route.genre)}</h2>
        <p class="route">${escapeHtml(route.fromName)} → ${escapeHtml(route.toName)}</p>
        <p class="description">${escapeHtml(route.description)}</p>
        ${audioSearchLinks(route.genre, route.fromName)}
      `;

      year.textContent = route.period;
      slider.value = String(index);
      const zoom = isMobile ? Math.max(2, route.camera[2] - 1) : route.camera[2];
      map.flyTo([route.camera[0], route.camera[1]], zoom, { duration: .85 });
    }

    function filterCity(key) {
      if (!places[key]) return;
      clearFilterLines();
      selectedCity = key;
      const [name, coords] = places[key];
      const related = connectedRoutes(key);

      Object.keys(markers).forEach(markerKey => getNodeElement(markerKey)?.classList.remove('selected-node'));
      getNodeElement(key)?.classList.add('selected-node');

      related.forEach(({ route }) => addRouteLine(route, 'filter'));

      const list = related.length
        ? related.map(({ route, i }) => `
          <div class="filter-route" onclick="window.__setRoute(${i})">
            <strong>${escapeHtml(route.genre)}</strong><br>${escapeHtml(route.fromName)} → ${escapeHtml(route.toName)} · ${escapeHtml(route.period)}<br>
            <span style="color:#99f6e4">▶ click route for audio examples</span>
          </div>
        `).join('')
        : '<div class="filter-route">No connected routes yet.</div>';

      story.innerHTML = `
        <span class="period">city filter</span>
        <h2 class="story-title">${escapeHtml(name)}</h2>
        <p class="route">${related.length} connected flow${related.length === 1 ? '' : 's'}</p>
        <div class="filter-list">${list}</div>
      `;

      year.textContent = 'Filter';
      map.flyTo(coords, isMobile ? 4 : 5, { duration: .8 });
    }

    Object.entries(places).forEach(([key, [name, coords, kind, note]]) => {
      const nodeIcon = L.divIcon({
        className: '',
        html: `<div class="node ${kind}" data-city="${escapeHtml(key)}"></div>`,
        iconSize: isMobile ? [22, 22] : [18, 18],
        iconAnchor: isMobile ? [11, 11] : [9, 9]
      });

      const labelIcon = L.divIcon({
        className: '',
        html: `<div class="city-label">${escapeHtml(name)}</div>`,
        iconSize: [100, 26],
        iconAnchor: [50, -12]
      });

      markers[key] = L.marker(coords, { icon: nodeIcon }).addTo(map);
      markers[key].bindPopup(`<strong>${escapeHtml(name)}</strong><br>${escapeHtml(note)}`);

      if (!isMobile) {
        markers[key].on('mouseover', () => showHover(key));
        markers[key].on('mouseout', clearHover);
      }
      markers[key].on('click', () => filterCity(key));

      labels.push(L.marker(coords, { icon: labelIcon, interactive: false }).addTo(map));
    });

    window.__setRoute = function(i) {
      setActive(i, true);
    };

    slider.addEventListener('input', e => setActive(e.target.value));

    play.addEventListener('click', () => {
      isPlaying = !isPlaying;
      play.textContent = isPlaying ? 'Ⅱ' : '▶';

      if (isPlaying) {
        timer = setInterval(() => setActive((index + 1) % routes.length), 5200);
      } else {
        clearInterval(timer);
      }
    });

    reset.addEventListener('click', () => {
      clearFilterLines();
      setActive(index);
    });

    setActive(0);
  </script>
